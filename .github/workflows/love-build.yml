name: Build LÖVE Frontend

on:
  push:
    tags:
      - 'love-v*'
  workflow_dispatch:

env:
  LOVE_VERSION: '11.5'

jobs:
  # ------------------------------------------------------------------
  # Create the .love file (zip of love/ game directory)
  # ------------------------------------------------------------------
  create-love-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .love file
        run: |
          cd love
          zip -9 -r ../PathOfBuilding.love . \
            -x "run.sh" -x "run.bat" -x "build-app-linux.sh" -x "build-app-windows.bat" -x "scripts/*"

      - uses: actions/upload-artifact@v4
        with:
          name: love-file
          path: PathOfBuilding.love
          retention-days: 5

  # ------------------------------------------------------------------
  # Windows x64 — download LÖVE, fuse, package
  # ------------------------------------------------------------------
  build-windows:
    needs: create-love-file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download LÖVE
        run: |
          curl -L -o love-win64.zip \
            "https://github.com/love2d/love/releases/download/${{ env.LOVE_VERSION }}/love-${{ env.LOVE_VERSION }}-win64.zip"
          unzip love-win64.zip
          mv "love-${{ env.LOVE_VERSION }}-win64" love-win64

      - uses: actions/download-artifact@v4
        with:
          name: love-file

      - name: Fuse and package
        run: |
          mkdir -p dist/PathOfBuilding

          # Fuse love.exe + .love → LOVE-PathOfBuilding.exe
          cat love-win64/love.exe PathOfBuilding.love > dist/PathOfBuilding/LOVE-PathOfBuilding.exe

          # Copy LÖVE runtime DLLs
          for f in love-win64/*.dll; do
            cp "$f" dist/PathOfBuilding/
          done

          # Copy LÖVE license
          if [ -f love-win64/license.txt ]; then
            cp love-win64/license.txt dist/PathOfBuilding/love-license.txt
          fi

          # Copy game data
          cp -r src dist/PathOfBuilding/src
          mkdir -p dist/PathOfBuilding/runtime
          cp -r runtime/lua dist/PathOfBuilding/runtime/lua
          cp -r love/lib dist/PathOfBuilding/lib

          # Copy manifest and default part files for auto-updates
          if [ -f manifest.xml ]; then
            cp manifest.xml dist/PathOfBuilding/src/manifest.xml
          fi
          for f in changelog.txt help.txt LICENSE.md; do
            [ -f "$f" ] && cp "$f" dist/PathOfBuilding/src/"$f"
          done

          # Copy launcher and license
          cp love/run.bat dist/PathOfBuilding/
          if [ -f LICENSE.md ]; then
            cp LICENSE.md dist/PathOfBuilding/
          fi

      - name: Create zip
        run: |
          cd dist
          zip -9 -r ../PathOfBuilding-love-windows-x64.zip PathOfBuilding/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: PathOfBuilding-love-windows-x64.zip
          retention-days: 5

  # ------------------------------------------------------------------
  # Linux x64 — download LÖVE AppImage, extract, fuse, package
  # ------------------------------------------------------------------
  build-linux:
    needs: create-love-file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and extract LÖVE AppImage
        run: |
          curl -L -o love.AppImage \
            "https://github.com/love2d/love/releases/download/${{ env.LOVE_VERSION }}/love-${{ env.LOVE_VERSION }}-x86_64.AppImage"
          chmod +x love.AppImage
          ./love.AppImage --appimage-extract
          mv squashfs-root love-extracted

      - uses: actions/download-artifact@v4
        with:
          name: love-file

      - name: Fuse and package
        run: |
          mkdir -p dist/PathOfBuilding/runtime dist/PathOfBuilding/love-runtime

          # Copy LÖVE shared libraries
          cp -r love-extracted/lib dist/PathOfBuilding/love-runtime/lib

          # Fuse love binary + .love at the top level (alongside src/, lib/, runtime/)
          cat love-extracted/bin/love PathOfBuilding.love \
            > dist/PathOfBuilding/pob-love
          chmod +x dist/PathOfBuilding/pob-love

          # Copy game data
          cp -r src dist/PathOfBuilding/src
          cp -r runtime/lua dist/PathOfBuilding/runtime/lua
          cp -r love/lib dist/PathOfBuilding/lib

          # Copy manifest and default part files for auto-updates
          if [ -f manifest.xml ]; then
            cp manifest.xml dist/PathOfBuilding/src/manifest.xml
          fi
          for f in changelog.txt help.txt LICENSE.md; do
            [ -f "$f" ] && cp "$f" dist/PathOfBuilding/src/"$f"
          done

          # Create launcher script
          cat > dist/PathOfBuilding/LOVE-PathOfBuilding << 'LAUNCHER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$SCRIPT_DIR/love-runtime/lib:$LD_LIBRARY_PATH"
          exec "$SCRIPT_DIR/pob-love" "$@"
          LAUNCHER
          chmod +x dist/PathOfBuilding/LOVE-PathOfBuilding

          # Copy license
          if [ -f LICENSE.md ]; then
            cp LICENSE.md dist/PathOfBuilding/
          fi

      - name: Create tarball
        run: |
          cd dist
          tar czf ../PathOfBuilding-love-linux-x64.tar.gz PathOfBuilding/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: PathOfBuilding-love-linux-x64.tar.gz
          retention-days: 5

  # ------------------------------------------------------------------
  # Create GitHub Release (only on tag push)
  # ------------------------------------------------------------------
  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/love-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-x64

      - uses: actions/download-artifact@v4
        with:
          name: linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "LÖVE Frontend ${{ github.ref_name }}"
          body: |
            ## LÖVE Frontend Release

            Cross-platform Path of Building using the LÖVE 2D framework.

            ### Downloads
            - **Windows x64**: `PathOfBuilding-love-windows-x64.zip` — Extract and run `LOVE-PathOfBuilding.exe`
            - **Linux x64**: `PathOfBuilding-love-linux-x64.tar.gz` — Extract and run `LOVE-PathOfBuilding`

            ### Requirements
            - **curl** on PATH (ships with Windows 10+ and all modern Linux distros)
            - No other dependencies — LÖVE runtime is bundled
          files: |
            PathOfBuilding-love-windows-x64.zip
            PathOfBuilding-love-linux-x64.tar.gz
